<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow-slate" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#475569"/>
    </marker>
    <marker id="arrow-orange" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#f97316"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="1280" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="640" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Secure GNN Serving — AWS Architecture</text>
  <text x="640" y="54" text-anchor="middle" font-size="12" fill="#64748b">Deploy path  ·  Request path  ·  Data plane  ·  Observability</text>

  <!-- AWS Account boundary -->
  <rect x="180" y="74" width="1080" height="678" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" rx="8"/>
  <text x="200" y="92" font-size="11" font-weight="700" fill="#64748b" letter-spacing="0.5">AWS ACCOUNT  ·  us-west-2</text>

  <!-- ================================================================ -->
  <!--                    DEPLOY PATH (top row)                         -->
  <!-- ================================================================ -->
  <text x="200" y="118" font-size="11" font-weight="700" fill="#15803d" letter-spacing="0.5">DEPLOY PATH</text>

  <rect x="40" y="128" width="120" height="52" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" rx="5"/>
  <text x="100" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">GitHub Actions</text>
  <text x="100" y="164" text-anchor="middle" font-size="9" fill="#64748b">main branch only</text>

  <line x1="160" y1="154" x2="220" y2="154" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="190" y="146" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="600">OIDC</text>

  <rect x="224" y="128" width="100" height="52" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5" rx="5"/>
  <text x="274" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">STS</text>
  <text x="274" y="164" text-anchor="middle" font-size="9" fill="#64748b">AssumeRole</text>

  <line x1="324" y1="154" x2="370" y2="154" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="374" y="128" width="120" height="52" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5" rx="5"/>
  <text x="434" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">IAM Role</text>
  <text x="434" y="164" text-anchor="middle" font-size="9" fill="#64748b">cdk-deploy</text>

  <line x1="494" y1="154" x2="540" y2="154" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <rect x="544" y="128" width="140" height="52" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5" rx="5"/>
  <text x="614" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">CloudFormation</text>
  <text x="614" y="164" text-anchor="middle" font-size="9" fill="#64748b">7 stacks via CDK</text>

  <line x1="684" y1="154" x2="744" y2="154" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-green)"/>

  <text x="752" y="150" font-size="11" fill="#16a34a" font-style="italic" font-weight="600">manages all resources below ↓</text>
  <text x="752" y="166" font-size="9" fill="#64748b" font-style="italic">trust pinned to refs/heads/main</text>

  <line x1="200" y1="200" x2="1240" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- ================================================================ -->
  <!--                    REQUEST PATH (middle)                         -->
  <!-- ================================================================ -->
  <text x="200" y="224" font-size="11" font-weight="700" fill="#c2410c" letter-spacing="0.5">REQUEST PATH</text>

  <!-- Customer (outside boundary) -->
  <rect x="40" y="280" width="120" height="64" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" rx="5"/>
  <text x="100" y="306" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Customer</text>
  <text x="100" y="322" text-anchor="middle" font-size="10" fill="#64748b">+ API key</text>
  <text x="100" y="336" text-anchor="middle" font-size="9" fill="#94a3b8">curl or WebUI</text>

  <line x1="160" y1="312" x2="222" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="191" y="303" text-anchor="middle" font-size="9" fill="#475569" font-weight="600">X-Api-Key</text>
  <text x="191" y="328" text-anchor="middle" font-size="9" fill="#94a3b8">HTTP</text>

  <!-- ALB -->
  <rect x="226" y="280" width="100" height="64" fill="#fff7ed" stroke="#c2410c" stroke-width="1.5" rx="5"/>
  <text x="276" y="306" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">ALB</text>
  <text x="276" y="322" text-anchor="middle" font-size="9" fill="#64748b">Application</text>
  <text x="276" y="335" text-anchor="middle" font-size="9" fill="#64748b">Load Balancer</text>

  <line x1="326" y1="312" x2="394" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-slate)"/>

  <!-- ECS Fargate Dispatcher -->
  <rect x="398" y="252" width="260" height="120" fill="#fff7ed" stroke="#f97316" stroke-width="2.5" rx="8"/>
  <text x="528" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">ECS Fargate</text>
  <text x="528" y="291" text-anchor="middle" font-size="11" fill="#475569">FastAPI Dispatcher  ·  0.25 vCPU</text>
  <line x1="418" y1="302" x2="638" y2="302" stroke="#fed7aa" stroke-width="1"/>
  <text x="528" y="318" text-anchor="middle" font-size="10" fill="#475569">verify key fingerprint</text>
  <text x="528" y="332" text-anchor="middle" font-size="10" fill="#475569">SHA-256 hash payload</text>
  <text x="528" y="346" text-anchor="middle" font-size="10" fill="#475569">route by tier</text>
  <text x="528" y="360" text-anchor="middle" font-size="10" fill="#475569">write verdict row</text>

  <!-- Dispatcher → SageMaker small (top-right) -->
  <path d="M 658 275 Q 720 275 750 238" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="708" y="251" text-anchor="middle" font-size="10" fill="#c2410c" font-weight="600">tier=small</text>

  <!-- SageMaker async (CPU) -->
  <rect x="754" y="208" width="280" height="62" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="894" y="231" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">SageMaker async endpoint  ·  CPU</text>
  <text x="894" y="247" text-anchor="middle" font-size="10" fill="#64748b">GraphSAGE  ·  ml.m5.large</text>
  <text x="894" y="261" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">scale-to-zero  ·  target-tracking + step on backlog</text>

  <!-- Dispatcher → SageMaker large (bottom-right) -->
  <path d="M 658 350 Q 720 350 750 386" stroke="#f97316" stroke-width="1.5" fill="none" marker-end="url(#arrow-orange)"/>
  <text x="708" y="385" text-anchor="middle" font-size="10" fill="#c2410c" font-weight="600">tier=large</text>

  <!-- SageMaker async (GPU) -->
  <rect x="754" y="354" width="280" height="62" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <text x="894" y="377" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">SageMaker async endpoint  ·  GPU</text>
  <text x="894" y="393" text-anchor="middle" font-size="10" fill="#64748b">EquiformerV2-153M  ·  ml.g4dn.xlarge</text>
  <text x="894" y="407" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">scale-to-zero  ·  target-tracking + step on backlog</text>

  <!-- "same construct" annotation -->
  <path d="M 1040 240 Q 1066 240 1066 312 Q 1066 385 1040 385" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <text x="1078" y="306" font-size="10" font-style="italic" fill="#64748b">same CDK</text>
  <text x="1078" y="320" font-size="10" font-style="italic" fill="#64748b">construct</text>
  <text x="1078" y="334" font-size="10" font-style="italic" fill="#64748b">~5-line diff</text>

  <line x1="200" y1="448" x2="1240" y2="448" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- ================================================================ -->
  <!--                    DATA PLANE                                    -->
  <!-- ================================================================ -->
  <text x="200" y="472" font-size="11" font-weight="700" fill="#0369a1" letter-spacing="0.5">DATA PLANE</text>

  <!-- Secrets Manager -->
  <rect x="220" y="494" width="170" height="84" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5" rx="5"/>
  <text x="305" y="517" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Secrets Manager</text>
  <text x="305" y="534" text-anchor="middle" font-size="10" fill="#64748b">api-key-hashes</text>
  <text x="305" y="548" text-anchor="middle" font-size="10" fill="#64748b">SHA-256 fingerprints</text>
  <text x="305" y="567" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">no raw keys in code</text>

  <!-- DynamoDB (centerpiece) -->
  <rect x="410" y="494" width="170" height="84" fill="#dbeafe" stroke="#0284c7" stroke-width="2.5" rx="5"/>
  <text x="495" y="517" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">DynamoDB</text>
  <text x="495" y="534" text-anchor="middle" font-size="10" fill="#475569">verdict table + GSI</text>
  <text x="495" y="548" text-anchor="middle" font-size="10" fill="#475569">PK: user_id_hash</text>
  <text x="495" y="567" text-anchor="middle" font-size="9" font-style="italic" fill="#0369a1">"the delta"</text>

  <!-- S3 async-io -->
  <rect x="620" y="494" width="170" height="84" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5" rx="5"/>
  <text x="705" y="517" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">S3 async-io</text>
  <text x="705" y="534" text-anchor="middle" font-size="10" fill="#64748b">input/output staging</text>
  <text x="705" y="548" text-anchor="middle" font-size="10" fill="#64748b">lifecycle: 1 day TTL</text>
  <text x="705" y="567" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">customer IP not persisted</text>

  <!-- S3 model-artifacts -->
  <rect x="810" y="494" width="170" height="84" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5" rx="5"/>
  <text x="895" y="517" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">S3 model-artifacts</text>
  <text x="895" y="534" text-anchor="middle" font-size="10" fill="#64748b">model weights .tar.gz</text>
  <text x="895" y="548" text-anchor="middle" font-size="10" fill="#64748b">read at endpoint create</text>
  <text x="895" y="567" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">deploy-time only</text>

  <!-- ECR -->
  <rect x="1000" y="494" width="160" height="84" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5" rx="5"/>
  <text x="1080" y="517" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">ECR</text>
  <text x="1080" y="534" text-anchor="middle" font-size="10" fill="#64748b">3 repos:</text>
  <text x="1080" y="548" text-anchor="middle" font-size="10" fill="#64748b">dispatcher · small · large</text>
  <text x="1080" y="567" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">deploy-time pull</text>

  <!-- arrows: Dispatcher ↔ Secrets Manager (auth) -->
  <path d="M 460 372 Q 400 430 305 494" stroke="#0ea5e9" stroke-width="1.3" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>
  <text x="320" y="446" font-size="10" fill="#0369a1" font-weight="600">verify hash</text>

  <!-- arrow: Dispatcher → DynamoDB (write verdict) -->
  <line x1="528" y1="372" x2="495" y2="494" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="540" y="446" font-size="10" fill="#0369a1" font-weight="600">write verdict</text>

  <!-- arrows: SageMaker (small + large) ↔ S3 async-io -->
  <path d="M 800 270 Q 760 380 705 494" stroke="#0ea5e9" stroke-width="1.3" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>
  <path d="M 800 416 Q 760 460 705 494" stroke="#0ea5e9" stroke-width="1.3" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>
  <text x="772" y="468" font-size="10" fill="#0369a1" font-weight="600">read input /</text>
  <text x="772" y="482" font-size="10" fill="#0369a1" font-weight="600">write output</text>

  <line x1="200" y1="608" x2="1240" y2="608" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="2,3"/>

  <!-- ================================================================ -->
  <!--                    OBSERVABILITY                                 -->
  <!-- ================================================================ -->
  <text x="200" y="632" font-size="11" font-weight="700" fill="#7e22ce" letter-spacing="0.5">OBSERVABILITY</text>

  <rect x="220" y="650" width="220" height="64" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5" rx="5"/>
  <text x="330" y="673" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">CloudTrail</text>
  <text x="330" y="689" text-anchor="middle" font-size="10" fill="#64748b">account-wide audit log</text>
  <text x="330" y="703" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">every AWS API call recorded</text>

  <rect x="460" y="650" width="220" height="64" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5" rx="5"/>
  <text x="570" y="673" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">CloudWatch</text>
  <text x="570" y="689" text-anchor="middle" font-size="10" fill="#64748b">metrics + alarms</text>
  <text x="570" y="703" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">drives SageMaker autoscaling</text>

  <rect x="700" y="650" width="240" height="64" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5" rx="5"/>
  <text x="820" y="673" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">App-level telemetry</text>
  <text x="820" y="689" text-anchor="middle" font-size="10" fill="#64748b">DynamoDB verdict buckets</text>
  <text x="820" y="703" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">/v1/admin/metrics dashboard</text>

  <!-- Legend -->
  <text x="200" y="744" font-size="10" fill="#475569" font-weight="600">Legend:</text>
  <line x1="248" y1="741" x2="278" y2="741" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
  <text x="284" y="744" font-size="10" fill="#64748b">customer request</text>
  <line x1="394" y1="741" x2="424" y2="741" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="430" y="744" font-size="10" fill="#64748b">tier routing</text>
  <line x1="520" y1="741" x2="550" y2="741" stroke="#0ea5e9" stroke-width="1.3" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>
  <text x="556" y="744" font-size="10" fill="#64748b">data plane access</text>
  <line x1="678" y1="741" x2="708" y2="741" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="714" y="744" font-size="10" fill="#64748b">deploy-time</text>
</svg>
