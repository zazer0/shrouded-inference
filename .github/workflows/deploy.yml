name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2

jobs:
  prep:
    # Skip for PR-close events (those go to teardown).
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      ENV_NAME: ${{ steps.env.outputs.ENV_NAME }}
      SUFFIX: ${{ steps.env.outputs.SUFFIX }}
      PROJECT_NAME: ${{ steps.project.outputs.PROJECT_NAME }}
      PASCAL_PROJECT: ${{ steps.project.outputs.PASCAL_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute env name
        id: env
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ENV_NAME=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "SUFFIX=-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "ENV_NAME=prod" >> "$GITHUB_OUTPUT"
            echo "SUFFIX=" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve project name
        id: project
        run: |
          PROJECT_NAME="$(jq -r '.context.projectName // "shrouded-inference"' infra/cdk.json)"
          echo "PROJECT_NAME=${PROJECT_NAME}" >> "$GITHUB_OUTPUT"
          PASCAL_PROJECT="$(printf '%s' "$PROJECT_NAME" | awk -F- '{for(i=1;i<=NF;i++)$i=toupper(substr($i,1,1)) substr($i,2)}1' OFS='')"
          echo "PASCAL_PROJECT=${PASCAL_PROJECT}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate AWS_DEPLOY_ROLE_ARN secret shape
        id: validate_arn
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          case "$ROLE_ARN" in
            arn:aws:iam::*:role/*)
              printf 'AWS_DEPLOY_ROLE_ARN: valid full ARN (%d chars)\n' "${#ROLE_ARN}"
              echo "valid=true" >> "$GITHUB_OUTPUT"
              ;;
            '')
              printf '::error::AWS_DEPLOY_ROLE_ARN is EMPTY — secret not set. Run bootstrap.\n'
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf '::error::AWS_DEPLOY_ROLE_ARN is %d chars and does NOT match arn:aws:iam::*:role/* — run bootstrap to set correct ARN\n' "${#ROLE_ARN}"
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: aws-actions/configure-aws-credentials@v4
        id: aws_auth
        if: steps.validate_arn.outputs.valid == 'true'
        continue-on-error: true
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: OIDC remediation hint
        if: steps.validate_arn.outputs.valid == 'false' || steps.aws_auth.outcome == 'failure'
        run: |
          cat <<'EOF' >&2
          OIDC credential exchange failed. Likely causes (in order of frequency):

            1. Secret AWS_DEPLOY_ROLE_ARN is unset, empty, or not a full ARN.
               Required shape: arn:aws:iam::<account>:role/<name>
               (The action error "Source Account ID is needed if the Role Name
               is provided and not the Role Arn" is this case.)

            2. The IAM role's trust policy no longer permits this repository
               (e.g. after a repo rename, fork, or first-time setup).

            3. The OIDC provider or IAM role does not exist in this account.

          Recovery (one-shot, local) — fixes all three causes idempotently:

            cd <repo-root>
            set -a && . ./.envrc && set +a    # loads gnn-deployer AWS creds
            sh scripts/bootstrap_new_deploy_ci.sh <project_name>

          The bootstrap script (a) deploys/updates the OIDC stack, (b) reads
          DeployRoleArn from CloudFormation, (c) validates it as an ARN, and
          (d) overwrites the GitHub secret AWS_DEPLOY_ROLE_ARN. Re-running it
          is safe.

          See README "First-time setup / repo rename recovery" for details.
          EOF
          exit 1

      - name: Install CDK deps
        working-directory: infra
        run: npm ci

      - name: Materialize ECR repo via CoreStack
        # Suffixed ECR repo only exists after CoreStack deploys for this env.
        # Run CoreStack first so the matrix builds can push to it.
        working-directory: infra
        run: npx cdk deploy CoreStack${{ steps.env.outputs.SUFFIX }} --context env=${{ steps.env.outputs.ENV_NAME }} --require-approval never

      - name: Seed equiformer artifact in per-env bucket
        if: steps.env.outputs.ENV_NAME != 'prod'
        run: |
          SRC="s3://${{ steps.project.outputs.PROJECT_NAME }}-model-artifacts-${{ steps.aws_auth.outputs.aws-account-id }}/equiformer/model-v2.tar.gz"
          DST="s3://${{ steps.project.outputs.PROJECT_NAME }}-model-artifacts-${{ steps.aws_auth.outputs.aws-account-id }}${{ steps.env.outputs.SUFFIX }}/equiformer/model-v2.tar.gz"
          aws s3 cp "$SRC" "$DST"

  build:
    needs: [prep]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [dispatcher, graphsage, equiformer]
    steps:
      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          df -h /

      - name: Validate AWS_DEPLOY_ROLE_ARN secret shape
        id: validate_arn
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          case "$ROLE_ARN" in
            arn:aws:iam::*:role/*)
              printf 'AWS_DEPLOY_ROLE_ARN: valid full ARN (%d chars)\n' "${#ROLE_ARN}"
              echo "valid=true" >> "$GITHUB_OUTPUT"
              ;;
            '')
              printf '::error::AWS_DEPLOY_ROLE_ARN is EMPTY — secret not set. Run bootstrap.\n'
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf '::error::AWS_DEPLOY_ROLE_ARN is %d chars and does NOT match arn:aws:iam::*:role/* — run bootstrap to set correct ARN\n' "${#ROLE_ARN}"
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: aws-actions/configure-aws-credentials@v4
        id: aws_auth
        if: steps.validate_arn.outputs.valid == 'true'
        continue-on-error: true
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: OIDC remediation hint
        if: steps.validate_arn.outputs.valid == 'false' || steps.aws_auth.outcome == 'failure'
        run: |
          cat <<'EOF' >&2
          OIDC credential exchange failed. Likely causes (in order of frequency):

            1. Secret AWS_DEPLOY_ROLE_ARN is unset, empty, or not a full ARN.
               Required shape: arn:aws:iam::<account>:role/<name>
               (The action error "Source Account ID is needed if the Role Name
               is provided and not the Role Arn" is this case.)

            2. The IAM role's trust policy no longer permits this repository
               (e.g. after a repo rename, fork, or first-time setup).

            3. The OIDC provider or IAM role does not exist in this account.

          Recovery (one-shot, local) — fixes all three causes idempotently:

            cd <repo-root>
            set -a && . ./.envrc && set +a    # loads gnn-deployer AWS creds
            sh scripts/bootstrap_new_deploy_ci.sh <project_name>

          The bootstrap script (a) deploys/updates the OIDC stack, (b) reads
          DeployRoleArn from CloudFormation, (c) validates it as an ARN, and
          (d) overwrites the GitHub secret AWS_DEPLOY_ROLE_ARN. Re-running it
          is safe.

          See README "First-time setup / repo rename recovery" for details.
          EOF
          exit 1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "${{ steps.aws_auth.outputs.aws-account-id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

      - name: Login to DLC ECR (base images)
        # Idempotent + free; keep uniform across matrix entries even though
        # only graphsage/equiformer pull from DLC ECR.
        run: |
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "763104351884.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

      - name: Build and push image
        run: |
          REG="${{ steps.aws_auth.outputs.aws-account-id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          SUFFIX="${{ needs.prep.outputs.SUFFIX }}"
          ENV_NAME="${{ needs.prep.outputs.ENV_NAME }}"
          SHA="${{ github.sha }}"

          case "${{ matrix.image }}" in
            dispatcher)
              ctx="dispatcher"
              repo="${{ needs.prep.outputs.PROJECT_NAME }}-dispatcher"
              ;;
            graphsage)
              ctx="models/graphsage"
              repo="${{ needs.prep.outputs.PROJECT_NAME }}-graphsage-inference"
              ;;
            equiformer)
              ctx="models/equiformer"
              repo="${{ needs.prep.outputs.PROJECT_NAME }}-equiformer-inference"
              ;;
            *)
              echo "FAIL: unknown matrix image ${{ matrix.image }}"; exit 1;;
          esac

          # Build-and-push fallback used by both PR cache-miss and prod
          # sibling-miss paths. Defined once to keep the two fall-throughs
          # identical (no drift between PR and prod build behaviour).
          build_and_push() {
            echo "CACHE MISS: building ${repo}${SUFFIX}"
            docker build --provenance=false \
              -t "${REG}/${repo}${SUFFIX}:content-${HASH}" "${ctx}"
            docker tag "${REG}/${repo}${SUFFIX}:content-${HASH}" "${REG}/${repo}${SUFFIX}:${SHA}"
            docker push "${REG}/${repo}${SUFFIX}:content-${HASH}"
            docker push "${REG}/${repo}${SUFFIX}:${SHA}"
          }

          # Stage 1.3: content-hash skip.
          # Hash every git-tracked file under the build context so a touch-free
          # rebuild (e.g. infra-only PR) becomes a fast retag instead of a build.
          # `git ls-files <ctx>` scopes the hash to the build dir — files outside
          # the context can't drift the hash.
          HASH=$(git ls-files "${ctx}" | xargs sha256sum | sha256sum | awk '{print $1}')
          echo "Content hash for ${ctx} = ${HASH}"

          # describe-images exits non-zero on miss and prints ImageNotFoundException
          # to stderr; that stderr message is informational, not silenced.
          if aws ecr describe-images --repository-name "${repo}${SUFFIX}" \
               --image-ids imageTag="content-${HASH}" >/dev/null; then
            echo "CACHE HIT (same repo): retagging content-${HASH} -> ${SHA}"
            MANIFEST=$(aws ecr batch-get-image \
              --repository-name "${repo}${SUFFIX}" \
              --image-ids imageTag="content-${HASH}" \
              --query 'images[0].imageManifest' --output text)
            # CoreStack defaults to MUTABLE imageTagMutability so put-image
            # overwrites an existing :${SHA} tag. We only retag :${SHA}, never
            # :latest — ECR put-image rejects re-tagging a digest with a tag
            # already pointing at it (ImageAlreadyExistsException), and CDK
            # pins :${SHA} so :latest is unused (and banned per project memory).
            aws ecr put-image --repository-name "${repo}${SUFFIX}" \
              --image-tag "${SHA}" --image-manifest "$MANIFEST"
          else
            # Stage 2.A: peer-repo probe — runs in all envs (PR and prod).
            # A new pr-N env probes prod's `${repo}` (no suffix) plus all other
            # `${repo}-pr-*` siblings. Prod probes its PR siblings as before.
            # Excludes this env's own repo (already probed at the same-repo step above).
            # Round-trip via docker pull/tag/push — NOT ecr put-image — because layer
            # blobs are repo-scoped; a cross-repo manifest-only ref would dangle.
            SELF="${repo}${SUFFIX}"
            echo "Probing peer ${repo}* repos for content-${HASH} (excluding ${SELF})..."
            MATCHED=""
            PEERS=$(aws ecr describe-repositories \
              --query "repositories[?starts_with(repositoryName, '${repo}') && repositoryName != '${SELF}'].repositoryName" \
              --output text)
            for PEER in $PEERS; do
              if aws ecr describe-images --repository-name "$PEER" \
                   --image-ids imageTag="content-${HASH}" >/dev/null; then
                echo "CACHE HIT (peer ${PEER}): pull -> tag -> push into ${SELF}"
                docker pull "${REG}/${PEER}:content-${HASH}"
                docker tag "${REG}/${PEER}:content-${HASH}" "${REG}/${SELF}:content-${HASH}"
                docker tag "${REG}/${PEER}:content-${HASH}" "${REG}/${SELF}:${SHA}"
                docker push "${REG}/${SELF}:content-${HASH}"
                docker push "${REG}/${SELF}:${SHA}"
                MATCHED=1
                break
              fi
            done
            if [ -z "$MATCHED" ]; then
              echo "No peer cache hit for content-${HASH}; building."
              build_and_push
            fi
          fi

          # Stage 1.0 regression detector: SageMaker only accepts the v2
          # Docker manifest mediaType. Runs regardless of cache hit/miss so
          # a stale content-hash retag can never silently drift to OCI.
          MEDIA=$(aws ecr batch-get-image \
            --repository-name "${repo}${SUFFIX}" \
            --image-ids imageTag="${SHA}" \
            --query 'images[0].imageManifestMediaType' --output text)
          test "$MEDIA" = "application/vnd.docker.distribution.manifest.v2+json" \
            || { echo "FAIL: $repo manifest is $MEDIA"; exit 1; }

  cdk-deploy:
    needs: [prep, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate AWS_DEPLOY_ROLE_ARN secret shape
        id: validate_arn
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          case "$ROLE_ARN" in
            arn:aws:iam::*:role/*)
              printf 'AWS_DEPLOY_ROLE_ARN: valid full ARN (%d chars)\n' "${#ROLE_ARN}"
              echo "valid=true" >> "$GITHUB_OUTPUT"
              ;;
            '')
              printf '::error::AWS_DEPLOY_ROLE_ARN is EMPTY — secret not set. Run bootstrap.\n'
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf '::error::AWS_DEPLOY_ROLE_ARN is %d chars and does NOT match arn:aws:iam::*:role/* — run bootstrap to set correct ARN\n' "${#ROLE_ARN}"
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: aws-actions/configure-aws-credentials@v4
        id: aws_auth
        if: steps.validate_arn.outputs.valid == 'true'
        continue-on-error: true
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: OIDC remediation hint
        if: steps.validate_arn.outputs.valid == 'false' || steps.aws_auth.outcome == 'failure'
        run: |
          cat <<'EOF' >&2
          OIDC credential exchange failed. Likely causes (in order of frequency):

            1. Secret AWS_DEPLOY_ROLE_ARN is unset, empty, or not a full ARN.
               Required shape: arn:aws:iam::<account>:role/<name>
               (The action error "Source Account ID is needed if the Role Name
               is provided and not the Role Arn" is this case.)

            2. The IAM role's trust policy no longer permits this repository
               (e.g. after a repo rename, fork, or first-time setup).

            3. The OIDC provider or IAM role does not exist in this account.

          Recovery (one-shot, local) — fixes all three causes idempotently:

            cd <repo-root>
            set -a && . ./.envrc && set +a    # loads gnn-deployer AWS creds
            sh scripts/bootstrap_new_deploy_ci.sh <project_name>

          The bootstrap script (a) deploys/updates the OIDC stack, (b) reads
          DeployRoleArn from CloudFormation, (c) validates it as an ARN, and
          (d) overwrites the GitHub secret AWS_DEPLOY_ROLE_ARN. Re-running it
          is safe.

          See README "First-time setup / repo rename recovery" for details.
          EOF
          exit 1

      - name: Install CDK deps
        working-directory: infra
        run: npm ci

      - name: CDK deploy --all
        working-directory: infra
        run: |
          HOTSWAP=""
          if [ "${{ needs.prep.outputs.ENV_NAME }}" != "prod" ]; then
            HOTSWAP="--hotswap-fallback"
          fi
          npx cdk deploy --all --concurrency 4 $HOTSWAP \
            --context env=${{ needs.prep.outputs.ENV_NAME }} \
            --context imageTag=${{ github.sha }} \
            --require-approval never

      - name: Print deployment URLs
        run: |
          SUFFIX="${{ needs.prep.outputs.SUFFIX }}"
          PASCAL_PROJECT="${{ needs.prep.outputs.PASCAL_PROJECT }}"
          ALB=$(aws cloudformation describe-stacks \
            --stack-name "${PASCAL_PROJECT}DispatcherStack${SUFFIX}" \
            --query 'Stacks[0].Outputs[?OutputKey==`AlbDnsName`].OutputValue' \
            --output text)
          CDN=$(aws cloudformation describe-stacks \
            --stack-name "${PASCAL_PROJECT}DispatcherStack${SUFFIX}" \
            --query 'Stacks[0].Outputs[?OutputKey==`CdnDomain`].OutputValue' \
            --output text)
          echo "### Deployment URLs" >> "$GITHUB_STEP_SUMMARY"
          echo "| Endpoint | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CloudFront (HTTPS) | ${CDN} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ALB (HTTP) | http://${ALB}/ |" >> "$GITHUB_STEP_SUMMARY"
          echo "CloudFront: ${CDN}"
          echo "ALB: http://${ALB}/"

      - name: Assert SageMaker models point at fresh SHA (PR envs only)
        if: needs.prep.outputs.ENV_NAME != 'prod'
        run: |
          SUFFIX="${{ needs.prep.outputs.SUFFIX }}"
          SHA="${{ github.sha }}"
          for MODEL in $(aws sagemaker list-models --name-contains "${SUFFIX#-}" --query 'Models[].ModelName' --output text); do
            IMG=$(aws sagemaker describe-model --model-name "$MODEL" --query 'PrimaryContainer.Image' --output text)
            case "$IMG" in
              *":${SHA}") echo "OK: $MODEL -> $IMG";;
              *) echo "FAIL: $MODEL points at $IMG, not :${SHA}"; exit 1;;
            esac
          done

      - name: Smoke /healthz SHA match (PR envs only)
        if: needs.prep.outputs.ENV_NAME != 'prod'
        run: |
          SUFFIX="${{ needs.prep.outputs.SUFFIX }}"
          PASCAL_PROJECT="${{ needs.prep.outputs.PASCAL_PROJECT }}"
          ALB=$(aws cloudformation describe-stacks \
            --stack-name "${PASCAL_PROJECT}DispatcherStack${SUFFIX}" \
            --query 'Stacks[0].Outputs[?OutputKey==`AlbDnsName`].OutputValue' \
            --output text)
          curl -fsS "http://${ALB}/healthz" | jq -e --arg sha "${{ github.sha }}" '.sha == $sha' \
            || { echo "FAIL: deployed sha mismatch"; exit 1; }

  teardown:
    # Only fire on PR-close: tear down the ephemeral pr-<N> environment.
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Hold teardown 15 min for post-merge prod redeploy
        # Squash-merge fires push:main AND pull_request:closed simultaneously,
        # racing the post-merge prod redeploy (which docker-pulls from this
        # PR's sibling repos) against this teardown (which deletes them).
        # Hold long enough for the prod build matrix to finish pull/tag/push
        # of all 3 images before we destroy. Non-merged closes (closed without
        # merge) skip this hold and tear down immediately.
        if: github.event.pull_request.merged == true
        run: |
          echo "PR ${{ github.event.pull_request.number }} was merged — sleeping 900s before destroying pr-${{ github.event.pull_request.number }} stacks."
          sleep 900

      - uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate AWS_DEPLOY_ROLE_ARN secret shape
        id: validate_arn
        env:
          ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          case "$ROLE_ARN" in
            arn:aws:iam::*:role/*)
              printf 'AWS_DEPLOY_ROLE_ARN: valid full ARN (%d chars)\n' "${#ROLE_ARN}"
              echo "valid=true" >> "$GITHUB_OUTPUT"
              ;;
            '')
              printf '::error::AWS_DEPLOY_ROLE_ARN is EMPTY — secret not set. Run bootstrap.\n'
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf '::error::AWS_DEPLOY_ROLE_ARN is %d chars and does NOT match arn:aws:iam::*:role/* — run bootstrap to set correct ARN\n' "${#ROLE_ARN}"
              echo "valid=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - uses: aws-actions/configure-aws-credentials@v4
        id: aws_auth
        if: steps.validate_arn.outputs.valid == 'true'
        continue-on-error: true
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: OIDC remediation hint
        if: steps.validate_arn.outputs.valid == 'false' || steps.aws_auth.outcome == 'failure'
        run: |
          cat <<'EOF' >&2
          OIDC credential exchange failed. Likely causes (in order of frequency):

            1. Secret AWS_DEPLOY_ROLE_ARN is unset, empty, or not a full ARN.
               Required shape: arn:aws:iam::<account>:role/<name>
               (The action error "Source Account ID is needed if the Role Name
               is provided and not the Role Arn" is this case.)

            2. The IAM role's trust policy no longer permits this repository
               (e.g. after a repo rename, fork, or first-time setup).

            3. The OIDC provider or IAM role does not exist in this account.

          Recovery (one-shot, local) — fixes all three causes idempotently:

            cd <repo-root>
            set -a && . ./.envrc && set +a    # loads gnn-deployer AWS creds
            sh scripts/bootstrap_new_deploy_ci.sh <project_name>

          The bootstrap script (a) deploys/updates the OIDC stack, (b) reads
          DeployRoleArn from CloudFormation, (c) validates it as an ARN, and
          (d) overwrites the GitHub secret AWS_DEPLOY_ROLE_ARN. Re-running it
          is safe.

          See README "First-time setup / repo rename recovery" for details.
          EOF
          exit 1

      - name: Install CDK deps
        working-directory: infra
        run: npm ci

      - name: CDK destroy ephemeral env
        # --force is acceptable: ephemeral env, non-prod RemovalPolicy=DESTROY
        # plus auto-empty (Stage 1) lets the destroy succeed cleanly.
        working-directory: infra
        run: npx cdk destroy --all --context env=pr-${{ github.event.pull_request.number }} --force
